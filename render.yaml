services:
  - type: web
    name: crime-reporting-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: JDBC_DATABASE_URL
        fromDatabase:
          name: crime-reporting-db
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: crime-reporting-db
          property: connectionString
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: DB_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: APP_CORS_ALLOWED_ORIGINS
        value: "https://crime-reporting-red.vercel.app"
      - key: WS_ALLOWED_ORIGINS
        value: "https://crime-reporting-red.vercel.app"
      - key: ADMIN_NAME
        value: "System Admin"
      - key: ADMIN_EMAIL
        value: "admin@crime.local"
      - key: ADMIN_PASSWORD
        value: "Admin@12345"
      - key: MEDIA_UPLOAD_DIR
        value: ./uploads
      - key: MEDIA_MAX_FILES_PER_REPORT
        value: "5"
      - key: MEDIA_MAX_IMAGE_BYTES
        value: "2097152"
      - key: MEDIA_MAX_VIDEO_BYTES
        value: "10485760"
      - key: MULTIPART_MAX_FILE_SIZE
        value: "10MB"
      - key: MULTIPART_MAX_REQUEST_SIZE
        value: "50MB"

databases:
  - name: crime-reporting-db
    plan: free
    databaseName: crime_reporting
    user: crime_user
